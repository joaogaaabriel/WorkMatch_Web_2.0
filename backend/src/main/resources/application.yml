server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://db:5432/workmatch
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

keycloak:
  server-url: http://keycloak:8080
  realm: workmatch
  client-id: workmatch-backend
  client-secret: ${KEYCLOAK_CLIENT_SECRET}
  admin-username: admin
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD}