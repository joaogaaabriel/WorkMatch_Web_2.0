version: '3.8'

services:
  db:
    image: postgres:15
    container_name: workmatch-db
    environment:
      POSTGRES_DB: workmatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - workmatch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workmatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: workmatch-backend
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/workmatch
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
    networks:
      - workmatch-net

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile.dev
    container_name: workmatch-gateway
    environment:
      SERVER_PORT: 8083
    ports:
      - "8083:8083"
    depends_on:
      - backend
    networks:
      - workmatch-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workmatch-frontend
    ports:
      - "5173:5173"
    environment:
      - REACT_APP_API_URL=http://gateway:8083
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - gateway
    networks:
      - workmatch-net

volumes:
  db_data:

networks:
  workmatch-net:
    driver: bridge