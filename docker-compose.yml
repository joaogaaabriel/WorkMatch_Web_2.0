services:

  db:
    image: postgres:15
    container_name: workmatch-db
    environment:
      POSTGRES_DB: workmatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - workmatch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    container_name: workmatch-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/workmatch
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - workmatch-net

  backend:
    build:
      context: ./backend
    container_name: workmatch-backend
    environment:
      KEYCLOAK_CLIENT_SECRET: your-backend-client-secret
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - workmatch-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  gateway:
    build:
      context: ./gateway
    container_name: workmatch-gateway
    ports:
      - "8082:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - workmatch-net

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    mem_limit: 4g
    command: npm run dev -- --host 0.0.0.0
    networks:
      - workmatch-net

volumes:
  postgres_data:

networks:
  workmatch-net: